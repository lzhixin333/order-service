spring.application.name=order-service

# 1. Database Configuration (Pointing to the Docker container on 5433)
spring.datasource.url=jdbc:postgresql://localhost:5433/order_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. JPA / Hibernate Settings
# 'update' will automatically create the 'orders' table for you
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 3. Kafka Producer Settings (Matches your Apache Kafka container)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# 4. App Logging
logging.level.com.jamie.fullstack=INFO